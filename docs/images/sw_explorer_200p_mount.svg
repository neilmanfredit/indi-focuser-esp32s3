<?xml version="1.0" encoding="UTF-8"?>
<svg width="800" height="960" viewBox="0 0 800 960"
     xmlns="http://www.w3.org/2000/svg"
     font-family="'Segoe UI', Arial, sans-serif">

  <rect width="800" height="960" fill="#ffffff"/>

  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5"
            markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#7f8c8d" stroke-width="1.5"
            stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Header -->
  <rect x="0" y="0" width="800" height="60" fill="#1a252f"/>
  <text x="400" y="30" text-anchor="middle" dominant-baseline="central"
        font-size="18" font-weight="600" fill="#ffffff">
    SkyWatcher Explorer 200P — Motor Focuser Mount
  </text>
  <text x="400" y="50" text-anchor="middle" dominant-baseline="central"
        font-size="11" fill="#95a5a6">
    Non-invasive side bracket · 2" Crayford focuser · PETG · Fully reversible
  </text>

  <!-- ══════════════════════════════════════════════
       PART 1 — SIDE BRACKET
  ══════════════════════════════════════════════ -->
  <g transform="translate(30,80)">
    <rect x="0" y="0" width="240" height="280" rx="8" fill="#f8f9fa" stroke="#dde1e7" stroke-width="1"/>
    <!-- face plate -->
    <rect x="18" y="18" width="16" height="140" rx="4" fill="white" stroke="#2c3e50" stroke-width="2"/>
    <!-- screw holes in face plate -->
    <circle cx="26" cy="50"  r="4.5" fill="white" stroke="#2c3e50" stroke-width="1.5"/>
    <circle cx="26" cy="120" r="4.5" fill="white" stroke="#2c3e50" stroke-width="1.5"/>
    <text x="14" y="46"  font-size="8" fill="#7f8c8d" text-anchor="end">M3</text>
    <text x="14" y="116" font-size="8" fill="#7f8c8d" text-anchor="end">M3</text>
    <!-- structural web -->
    <rect x="34" y="48" width="122" height="65" rx="5" fill="white" stroke="#2c3e50" stroke-width="1.5"/>
    <!-- motor housing -->
    <rect x="156" y="30" width="68" height="102" rx="7" fill="#f0f3f6" stroke="#2c3e50" stroke-width="2"/>
    <!-- motor pocket circle -->
    <circle cx="190" cy="81" r="32" fill="white" stroke="#7f8c8d" stroke-width="1" stroke-dasharray="5 3"/>
    <text x="190" y="85" text-anchor="middle" font-size="9" fill="#5d6d7e">28BYJ-48</text>
    <!-- motor shaft clearance -->
    <circle cx="190" cy="81" r="8" fill="#e8f4fd" stroke="#7f8c8d" stroke-width="1" stroke-dasharray="3 3"/>
    <!-- motor mounting heat-sets -->
    <circle cx="162" cy="44"  r="3" fill="white" stroke="#7f8c8d" stroke-width="1"/>
    <circle cx="162" cy="120" r="3" fill="white" stroke="#7f8c8d" stroke-width="1"/>
    <!-- cable routing slot -->
    <rect x="165" y="108" width="24" height="12" rx="3" fill="none" stroke="#7f8c8d" stroke-width="0.8" stroke-dasharray="3 2"/>
    <!-- gear mesh zone arc on left of motor housing -->
    <path d="M156,62 Q140,81 156,100" fill="none" stroke="#e67e22" stroke-width="2" stroke-dasharray="4 2"/>
    <text x="132" y="78" font-size="8" fill="#e67e22">mesh</text>
    <!-- centre-distance annotation -->
    <line x1="34" y1="175" x2="190" y2="175" stroke="#7f8c8d" stroke-width="0.8" marker-start="url(#arr)" marker-end="url(#arr)"/>
    <text x="112" y="169" text-anchor="middle" font-size="8" fill="#7f8c8d">~60 mm (centre dist.)</text>
    <!-- part name -->
    <text x="115" y="210" text-anchor="middle" font-size="13" font-weight="600" fill="#1a252f">Side bracket</text>
    <text x="115" y="228" text-anchor="middle" font-size="10" fill="#5d6d7e">Attaches to focuser body side wall</text>
    <text x="115" y="244" text-anchor="middle" font-size="10" fill="#5d6d7e">Face plate + motor housing</text>
    <!-- attachment options -->
    <rect x="14" y="255" width="212" height="20" rx="4" fill="#e8f4fd" stroke="none"/>
    <text x="120" y="268" text-anchor="middle" font-size="9" fill="#2980b9">M3 screws or cable tie attachment</text>
  </g>
  <circle cx="57" cy="88" r="10" fill="#8e44ad"/>
  <text x="57" y="92" text-anchor="middle" font-size="10" font-weight="700" fill="white">1</text>

  <!-- ══════════════════════════════════════════════
       PART 2 — DRIVE GEAR
  ══════════════════════════════════════════════ -->
  <g transform="translate(300,80)">
    <rect x="0" y="0" width="230" height="280" rx="8" fill="#f8f9fa" stroke="#dde1e7" stroke-width="1"/>
    <!-- gear outer circle -->
    <circle cx="115" cy="108" r="95" fill="none" stroke="#2c3e50" stroke-width="2"/>
    <circle cx="115" cy="108" r="82" fill="#f3e8fd" stroke="#7f8c8d" stroke-width="0.8" stroke-dasharray="5 3" fill-opacity="0.35"/>
    <!-- 32T herringbone hints -->
    <g stroke="#2c3e50" stroke-width="1" fill="none">
      <path d="M210,94 L220,97 M210,102 L220,97"/>
      <path d="M200,64 L208,52 M194,66 L208,52"/>
      <path d="M168,34 L172,20 M162,36 L172,20"/>
      <path d="M116,16 L114,4  M108,18 L114,4"/>
      <path d="M64,34 L58,20  M60,40 L58,20"/>
      <path d="M30,64 L22,52  M26,70 L22,52"/>
      <path d="M20,94 L10,97  M20,102 L10,97"/>
      <path d="M20,122 L10,119 M20,130 L10,119"/>
      <path d="M30,154 L22,164 M36,152 L22,164"/>
      <path d="M64,182 L58,196 M70,180 L58,196"/>
      <path d="M116,200 L114,212 M122,198 L114,212"/>
      <path d="M168,182 L172,196 M174,178 L172,196"/>
      <path d="M200,154 L208,164 M194,152 L208,164"/>
      <path d="M210,122 L220,119 M210,130 L220,119"/>
    </g>
    <!-- lower grip hub -->
    <rect x="100" y="203" width="30" height="38" rx="4" fill="white" stroke="#2c3e50" stroke-width="1.5"/>
    <!-- shaft bore -->
    <circle cx="115" cy="108" r="5.5" fill="none" stroke="#2c3e50" stroke-width="1.5"/>
    <line x1="109" y1="105" x2="121" y2="105" stroke="#2c3e50" stroke-width="2"/>
    <!-- bore through hub -->
    <rect x="106" y="203" width="18" height="38" rx="2" fill="#e8f4fd" stroke="#7f8c8d" stroke-width="0.8" stroke-dasharray="3 3"/>
    <!-- grub screw -->
    <circle cx="115" cy="218" r="3" fill="white" stroke="#7f8c8d" stroke-width="1"/>
    <!-- grip slots on top cap -->
    <g stroke="#7f8c8d" stroke-width="1.2">
      <line x1="115" y1="14" x2="115" y2="22"/>
      <line x1="92"  y1="20" x2="96"  y2="28"/>
      <line x1="74"  y1="36" x2="80"  y2="42"/>
      <line x1="138" y1="20" x2="134" y2="28"/>
      <line x1="156" y1="36" x2="150" y2="42"/>
    </g>
    <text x="115" y="112" text-anchor="middle" font-size="9" fill="#8e44ad" font-weight="600">32T</text>
    <text x="115" y="260" text-anchor="middle" font-size="13" font-weight="600" fill="#1a252f">Drive gear (large)</text>
    <text x="115" y="276" text-anchor="middle" font-size="10" fill="#5d6d7e">32 T · replaces coarse knob</text>
  </g>
  <circle cx="327" cy="88" r="10" fill="#8e44ad"/>
  <text x="327" y="92" text-anchor="middle" font-size="10" font-weight="700" fill="white">2</text>

  <!-- ══════════════════════════════════════════════
       PART 3 — MOTOR PINION
  ══════════════════════════════════════════════ -->
  <g transform="translate(560,80)">
    <rect x="0" y="0" width="210" height="280" rx="8" fill="#f8f9fa" stroke="#dde1e7" stroke-width="1"/>
    <circle cx="105" cy="100" r="38" fill="none" stroke="#2c3e50" stroke-width="2"/>
    <circle cx="105" cy="100" r="28" fill="#f3e8fd" stroke="#7f8c8d" stroke-width="0.8" stroke-dasharray="4 3" fill-opacity="0.5"/>
    <g stroke="#2c3e50" stroke-width="1.1" fill="none">
      <path d="M143,90 L151,94 M143,100 L151,94"/>
      <path d="M134,68 L140,58 M128,70 L140,58"/>
      <path d="M105,64 L105,52 M99,66 L105,52"/>
      <path d="M76,68 L68,58  M80,70 L68,58"/>
      <path d="M67,90 L59,94  M67,100 L59,94"/>
      <path d="M67,110 L59,106 M67,120 L59,106"/>
      <path d="M76,132 L68,140 M82,130 L68,140"/>
      <path d="M105,136 L105,148 M111,134 L105,148"/>
      <path d="M134,132 L140,140 M128,130 L140,140"/>
      <path d="M143,110 L151,106 M143,120 L151,106"/>
    </g>
    <circle cx="105" cy="100" r="5.5" fill="none" stroke="#2c3e50" stroke-width="1.5"/>
    <line x1="99" y1="97" x2="111" y2="97" stroke="#2c3e50" stroke-width="2"/>
    <text x="105" y="104" text-anchor="middle" font-size="9" fill="#8e44ad" font-weight="600">10T</text>
    <circle cx="105" cy="62" r="2.5" fill="none" stroke="#7f8c8d" stroke-width="1"/>
    <text x="105" y="192" text-anchor="middle" font-size="13" font-weight="600" fill="#1a252f">Motor pinion</text>
    <text x="105" y="208" text-anchor="middle" font-size="10" fill="#5d6d7e">10 T · 5 mm D-shaft bore</text>
    <rect x="25" y="224" width="160" height="18" rx="4" fill="#8e44ad" fill-opacity="0.12"/>
    <text x="105" y="236" text-anchor="middle" font-size="9" fill="#8e44ad" font-weight="600">3.2:1 reduction ratio</text>
  </g>
  <circle cx="587" cy="88" r="10" fill="#8e44ad"/>
  <text x="587" y="92" text-anchor="middle" font-size="10" font-weight="700" fill="white">3</text>

  <!-- ══════════════════════════════════════════════
       ASSEMBLY — FRONT VIEW
  ══════════════════════════════════════════════ -->
  <g transform="translate(30,390)">
    <rect x="0" y="0" width="740" height="290" rx="8" fill="#f8f9fa" stroke="#dde1e7" stroke-width="1"/>
    <text x="370" y="24" text-anchor="middle" font-size="13" font-weight="600" fill="#1a252f">Installation — front view (non-invasive)</text>

    <!-- Crayford focuser body -->
    <rect x="60" y="50" width="440" height="115" rx="10" fill="white" stroke="#2c3e50" stroke-width="2.5"/>
    <text x="280" y="115" text-anchor="middle" font-size="12" fill="#5d6d7e">Crayford focuser body (76 mm wide)</text>

    <!-- draw tube slot (dashed) -->
    <rect x="215" y="38" width="130" height="138" rx="5" fill="none" stroke="#7f8c8d" stroke-width="1" stroke-dasharray="5 3"/>
    <text x="280" y="32" text-anchor="middle" font-size="9" fill="#7f8c8d">draw tube</text>

    <!-- LEFT knob — stays on -->
    <circle cx="60" cy="107" r="38" fill="#eafaf1" stroke="#27ae60" stroke-width="2"/>
    <text x="60" y="103" text-anchor="middle" font-size="9" fill="#1a252f" font-weight="600">manual</text>
    <text x="60" y="116" text-anchor="middle" font-size="9" fill="#27ae60">stays on</text>

    <!-- RIGHT side — drive gear -->
    <circle cx="500" cy="107" r="50" fill="#f3e8fd" stroke="#8e44ad" stroke-width="2"/>
    <text x="500" y="103" text-anchor="middle" font-size="9" fill="#1a252f" font-weight="600">drive gear</text>
    <text x="500" y="116" text-anchor="middle" font-size="9" fill="#8e44ad">(replaces knob)</text>

    <!-- remove knob arrow / label -->
    <text x="555" y="62" font-size="10" fill="#e74c3c" font-weight="600">remove this knob</text>
    <path d="M552,66 L518,88" stroke="#e74c3c" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>

    <!-- side bracket (thin rect on right of focuser body) -->
    <rect x="500" y="52" width="16" height="110" rx="3" fill="#f3e8fd" stroke="#8e44ad" stroke-width="1.5"/>

    <!-- motor housing beyond bracket -->
    <rect x="516" y="58" width="76" height="99" rx="7" fill="#f0f3f6" stroke="#2c3e50" stroke-width="1.5"/>
    <circle cx="554" cy="107" r="36" fill="white" stroke="#7f8c8d" stroke-width="1"/>
    <text x="554" y="103" text-anchor="middle" font-size="9" fill="#5d6d7e">28BYJ-48</text>
    <text x="554" y="116" text-anchor="middle" font-size="8" fill="#5d6d7e">motor</text>

    <!-- small pinion -->
    <circle cx="554" cy="107" r="20" fill="none" stroke="#2c3e50" stroke-width="1.5"/>
    <text x="554" y="135" text-anchor="middle" font-size="8" fill="#8e44ad" font-weight="600">10T</text>

    <!-- mesh contact -->
    <circle cx="517" cy="107" r="5" fill="#e74c3c"/>
    <text x="506" y="97" font-size="8" fill="#e74c3c">mesh</text>

    <!-- motor cable dashed line -->
    <path d="M516,170 Q460,200 220,210" fill="none" stroke="#7f8c8d" stroke-width="1" stroke-dasharray="4 3"/>
    <text x="370" y="208" text-anchor="middle" font-size="9" fill="#7f8c8d">motor cable to electronics box</text>

    <!-- Non-invasive callout box -->
    <rect x="60" y="232" width="340" height="48" rx="6" fill="#eafaf1" stroke="#27ae60" stroke-width="1.2"/>
    <text x="230" y="250" text-anchor="middle" font-size="10" font-weight="600" fill="#1a252f">Fully reversible — zero permanent modification</text>
    <text x="230" y="266" text-anchor="middle" font-size="10" fill="#5d6d7e">Left knob stays for manual focusing.</text>
    <text x="230" y="277" text-anchor="middle" font-size="10" fill="#5d6d7e">Bracket attaches with M3 screws or cable tie.</text>

    <!-- dimension callout: focuser body width -->
    <line x1="60" y1="180" x2="500" y2="180" stroke="#7f8c8d" stroke-width="0.8" marker-start="url(#arr)" marker-end="url(#arr)"/>
    <text x="280" y="195" text-anchor="middle" font-size="9" fill="#e74c3c" font-weight="600">76 mm ← verify with calipers, set focuser_body_w in SCAD</text>

    <!-- steps callout right side -->
    <text x="428" y="240" font-size="10" font-weight="600" fill="#1a252f">Steps:</text>
    <text x="428" y="256" font-size="10" fill="#5d6d7e">1. Remove one coarse knob</text>
    <text x="428" y="270" font-size="10" fill="#5d6d7e">2. Slide drive gear onto shaft</text>
    <text x="428" y="280" font-size="10" fill="#5d6d7e">3. Tighten M3 grub screw</text>
  </g>
  <circle cx="57" cy="398" r="10" fill="#8e44ad"/>
  <text x="57" y="402" text-anchor="middle" font-size="10" font-weight="700" fill="white">4</text>

  <!-- Hardware strip -->
  <rect x="20" y="702" width="760" height="58" rx="8" fill="#1a252f"/>
  <text x="400" y="724" text-anchor="middle" font-size="12" font-weight="600" fill="#ffffff">Hardware bill of materials</text>
  <text x="400" y="742" text-anchor="middle" font-size="10" fill="#95a5a6">M3×20 × 1 (knob shaft)  ·  M3×10 × 2 (bracket to focuser)  ·  M3 heat-set × 4  ·  M2×8 × 2 (motor PCB)  ·  M2 heat-set × 4  ·  M3 grub × 1</text>
  <text x="400" y="752" text-anchor="middle" font-size="10" fill="#95a5a6">Print: PETG  ·  0.2 mm layers  ·  4 perimeters  ·  45 % infill on gears  ·  No supports required</text>

  <!-- Footer -->
  <rect x="0" y="770" width="800" height="30" fill="#f0f3f6"/>
  <text x="400" y="788" text-anchor="middle" font-size="9" fill="#7f8c8d">
    github.com/YOUR_USERNAME/indi-focuser-esp32s3  ·  MIT Licence  ·  OpenSCAD source: 3d_files/skywatcher-explorer-200p/
  </text>
</svg>
