<?xml version="1.0" encoding="UTF-8"?>
<svg width="800" height="960" viewBox="0 0 800 960"
     xmlns="http://www.w3.org/2000/svg"
     font-family="'Segoe UI', Arial, sans-serif">

  <!-- Background -->
  <rect width="800" height="960" fill="#ffffff"/>

  <!-- Colour palette -->
  <!-- stroke-main: #2c3e50   stroke-dim: #7f8c8d   fill-light: #f8f9fa   accent: #2980b9   text-dark: #1a252f   text-mid: #5d6d7e -->

  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5"
            markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#7f8c8d" stroke-width="1.5"
            stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- ─── Header ─────────────────────────────────── -->
  <rect x="0" y="0" width="800" height="60" fill="#1a252f"/>
  <text x="400" y="30" text-anchor="middle" dominant-baseline="central"
        font-size="18" font-weight="600" fill="#ffffff">
    RVO Horizon 60 ED — Motor Focuser Mount
  </text>
  <text x="400" y="50" text-anchor="middle" dominant-baseline="central"
        font-size="11" fill="#95a5a6">
    Clamping bracket design · dual-speed rack-and-pinion focuser · PETG
  </text>

  <!-- ─── Section labels ──────────────────────────── -->
  <!-- Row 1 label -->
  <text x="20" y="90" font-size="10" fill="#7f8c8d" font-weight="600">PARTS</text>
  <!-- Row 2 label -->
  <text x="20" y="500" font-size="10" fill="#7f8c8d" font-weight="600">ASSEMBLY</text>

  <!-- ══════════════════════════════════════════════
       PART 1 — CLAMP BODY
  ══════════════════════════════════════════════ -->
  <g transform="translate(40,100)">
    <!-- card background -->
    <rect x="0" y="0" width="200" height="230" rx="8" fill="#f8f9fa" stroke="#dde1e7" stroke-width="1"/>
    <!-- main block -->
    <rect x="20" y="20" width="155" height="110" rx="7" fill="none" stroke="#2c3e50" stroke-width="1.8"/>
    <!-- focuser slot (dashed cutout) -->
    <rect x="36" y="20" width="123" height="82" rx="4" fill="#e8f4fd" stroke="#7f8c8d" stroke-width="1" stroke-dasharray="5 3"/>
    <!-- slot label -->
    <text x="97" y="66" text-anchor="middle" font-size="10" fill="#5d6d7e">58 mm slot</text>
    <!-- motor housing extension -->
    <rect x="175" y="38" width="48" height="74" rx="6" fill="none" stroke="#2c3e50" stroke-width="1.8"/>
    <!-- motor pocket circle -->
    <circle cx="199" cy="75" r="22" fill="#e8f4fd" stroke="#7f8c8d" stroke-width="1" stroke-dasharray="4 3"/>
    <text x="199" y="79" text-anchor="middle" font-size="9" fill="#5d6d7e">motor</text>
    <!-- split slot -->
    <line x1="97" y1="82" x2="97" y2="130" stroke="#7f8c8d" stroke-width="2" stroke-dasharray="3 2"/>
    <!-- clamp bolt holes -->
    <circle cx="28" cy="55"  r="4" fill="white" stroke="#2c3e50" stroke-width="1.2"/>
    <circle cx="28" cy="100" r="4" fill="white" stroke="#2c3e50" stroke-width="1.2"/>
    <!-- heat-set inserts top -->
    <circle cx="55"  cy="24" r="3" fill="white" stroke="#7f8c8d" stroke-width="1"/>
    <circle cx="140" cy="24" r="3" fill="white" stroke="#7f8c8d" stroke-width="1"/>
    <!-- part name -->
    <text x="110" y="163" text-anchor="middle" font-size="13" font-weight="600" fill="#1a252f">Clamp body</text>
    <text x="110" y="180" text-anchor="middle" font-size="10" fill="#5d6d7e">Wraps focuser body (58 mm)</text>
    <text x="110" y="195" text-anchor="middle" font-size="10" fill="#5d6d7e">Split slot for clamping action</text>
    <!-- legend dots -->
    <circle cx="30" cy="215" r="4" fill="white" stroke="#2c3e50" stroke-width="1.2"/>
    <text x="40" y="219" font-size="9" fill="#7f8c8d">bolt hole</text>
    <circle cx="90" cy="215" r="3" fill="white" stroke="#7f8c8d" stroke-width="1"/>
    <text x="100" y="219" font-size="9" fill="#7f8c8d">heat-set</text>
  </g>

  <!-- ══════════════════════════════════════════════
       PART 2 — FOCUSER KNOB GEAR
  ══════════════════════════════════════════════ -->
  <g transform="translate(270,100)">
    <rect x="0" y="0" width="200" height="230" rx="8" fill="#f8f9fa" stroke="#dde1e7" stroke-width="1"/>
    <!-- outer addendum circle -->
    <circle cx="100" cy="100" r="78" fill="none" stroke="#2c3e50" stroke-width="1.8"/>
    <!-- pitch circle (dashed) -->
    <circle cx="100" cy="100" r="66" fill="#e8f4fd" stroke="#7f8c8d" stroke-width="0.8" stroke-dasharray="5 3" fill-opacity="0.4"/>
    <!-- root circle -->
    <circle cx="100" cy="100" r="56" fill="none" stroke="#7f8c8d" stroke-width="0.6" stroke-dasharray="3 4"/>
    <!-- herringbone tooth silhouettes (40T simplified) -->
    <g stroke="#2c3e50" stroke-width="1" fill="none">
      <path d="M178,82 L188,85 M178,88 L188,85"/>
      <path d="M170,54 L178,44 M172,60 L178,44"/>
      <path d="M140,26 L144,14 M134,28 L144,14"/>
      <path d="M102,18 L100,6  M94,20 L100,6"/>
      <path d="M62,26 L56,14 M58,32 L56,14"/>
      <path d="M30,54 L22,44 M28,60 L22,44"/>
      <path d="M22,88 L12,85 M22,82 L12,85"/>
      <path d="M22,118 L12,115 M22,112 L12,115"/>
      <path d="M30,148 L22,158 M36,146 L22,158"/>
      <path d="M62,174 L56,186 M68,172 L56,186"/>
      <path d="M100,182 L100,194 M106,180 L100,194"/>
      <path d="M140,174 L144,186 M146,170 L144,186"/>
      <path d="M170,148 L178,158 M164,146 L178,158"/>
      <path d="M178,118 L188,115 M178,112 L188,115"/>
    </g>
    <!-- hub -->
    <circle cx="100" cy="100" r="16" fill="white" stroke="#2c3e50" stroke-width="1.5"/>
    <!-- D-shaft bore -->
    <circle cx="100" cy="100" r="5.5" fill="none" stroke="#2c3e50" stroke-width="1.5"/>
    <line x1="95" y1="97" x2="105" y2="97" stroke="#2c3e50" stroke-width="2"/>
    <!-- set screw -->
    <circle cx="100" cy="85" r="2.5" fill="none" stroke="#7f8c8d" stroke-width="1"/>
    <!-- tooth count label -->
    <text x="100" y="104" text-anchor="middle" font-size="9" fill="#2980b9" font-weight="600">40T</text>
    <!-- part name -->
    <text x="100" y="200" text-anchor="middle" font-size="13" font-weight="600" fill="#1a252f">Focuser knob gear</text>
    <text x="100" y="216" text-anchor="middle" font-size="10" fill="#5d6d7e">40 T · module 1.5 · herringbone</text>
  </g>

  <!-- ══════════════════════════════════════════════
       PART 3 — MOTOR PINION
  ══════════════════════════════════════════════ -->
  <g transform="translate(500,100)">
    <rect x="0" y="0" width="200" height="230" rx="8" fill="#f8f9fa" stroke="#dde1e7" stroke-width="1"/>
    <circle cx="100" cy="90" r="36" fill="none" stroke="#2c3e50" stroke-width="1.8"/>
    <circle cx="100" cy="90" r="28" fill="#e8f4fd" stroke="#7f8c8d" stroke-width="0.8" stroke-dasharray="4 3" fill-opacity="0.5"/>
    <g stroke="#2c3e50" stroke-width="1.1" fill="none">
      <path d="M136,82 L144,86 M136,90 L144,86"/>
      <path d="M128,62 L134,52 M122,64 L134,52"/>
      <path d="M100,68 L100,56 M94,70 L100,56"/>
      <path d="M72,62 L64,52 M78,64 L64,52"/>
      <path d="M64,82 L56,86 M64,90 L56,86"/>
      <path d="M64,100 L56,96 M64,108 L56,96"/>
      <path d="M72,120 L64,128 M78,118 L64,128"/>
      <path d="M100,126 L100,138 M106,124 L100,138"/>
      <path d="M128,120 L134,130 M122,118 L134,130"/>
      <path d="M136,100 L144,96 M136,108 L144,96"/>
    </g>
    <!-- D-shaft bore -->
    <circle cx="100" cy="90" r="5.5" fill="none" stroke="#2c3e50" stroke-width="1.5"/>
    <line x1="95" y1="87" x2="105" y2="87" stroke="#2c3e50" stroke-width="2"/>
    <text x="100" y="94" text-anchor="middle" font-size="9" fill="#2980b9" font-weight="600">10T</text>
    <!-- grub screw -->
    <circle cx="100" cy="62" r="2.5" fill="none" stroke="#7f8c8d" stroke-width="1"/>
    <text x="100" y="170" text-anchor="middle" font-size="13" font-weight="600" fill="#1a252f">Motor pinion</text>
    <text x="100" y="186" text-anchor="middle" font-size="10" fill="#5d6d7e">10 T · module 1.5 · herringbone</text>
    <text x="100" y="202" text-anchor="middle" font-size="10" fill="#5d6d7e">Press onto 28BYJ-48 D-shaft</text>
    <!-- gear ratio callout -->
    <rect x="20" y="215" width="160" height="10" rx="3" fill="#2980b9" fill-opacity="0.12"/>
    <text x="100" y="223" text-anchor="middle" font-size="9" fill="#2980b9" font-weight="600">4:1 reduction ratio</text>
  </g>

  <!-- ══════════════════════════════════════════════
       PART 4 — ELECTRONICS BOX
  ══════════════════════════════════════════════ -->
  <g transform="translate(40,360)">
    <rect x="0" y="0" width="200" height="120" rx="8" fill="#f8f9fa" stroke="#dde1e7" stroke-width="1"/>
    <!-- isometric box: front -->
    <rect x="20" y="34" width="120" height="62" rx="5" fill="white" stroke="#2c3e50" stroke-width="1.5"/>
    <!-- top face -->
    <path d="M20,34 L38,16 L158,16 L140,34 Z" fill="#f0f3f6" stroke="#2c3e50" stroke-width="1.5"/>
    <!-- right face -->
    <path d="M140,34 L158,16 L158,78 L140,96" fill="#e8ecf0" stroke="#2c3e50" stroke-width="1.5"/>
    <!-- USB cutout -->
    <rect x="60" y="55" width="26" height="13" rx="3" fill="#e8f4fd" stroke="#7f8c8d" stroke-width="1"/>
    <text x="73" y="65" text-anchor="middle" font-size="8" fill="#5d6d7e">USB-C</text>
    <!-- vent slots on top -->
    <line x1="52" y1="24" x2="58" y2="24" stroke="#7f8c8d" stroke-width="1.5"/>
    <line x1="66" y1="24" x2="72" y2="24" stroke="#7f8c8d" stroke-width="1.5"/>
    <line x1="80" y1="24" x2="86" y2="24" stroke="#7f8c8d" stroke-width="1.5"/>
    <line x1="94" y1="24" x2="100" y2="24" stroke="#7f8c8d" stroke-width="1.5"/>
    <!-- cable slot rear face -->
    <rect x="140" y="38" width="18" height="10" rx="2" fill="none" stroke="#7f8c8d" stroke-width="0.8" stroke-dasharray="3 2"/>
    <text x="90" y="112" text-anchor="middle" font-size="11" font-weight="600" fill="#1a252f">Electronics box + lid</text>
  </g>

  <!-- ══════════════════════════════════════════════
       ASSEMBLY — SIDE VIEW
  ══════════════════════════════════════════════ -->
  <g transform="translate(270,360)">
    <rect x="0" y="0" width="470" height="270" rx="8" fill="#f8f9fa" stroke="#dde1e7" stroke-width="1"/>
    <text x="235" y="24" text-anchor="middle" font-size="13" font-weight="600" fill="#1a252f">Assembly — side view</text>

    <!-- focuser tube -->
    <rect x="60" y="55" width="240" height="65" rx="8" fill="white" stroke="#2c3e50" stroke-width="2"/>
    <text x="180" y="91" text-anchor="middle" font-size="11" fill="#5d6d7e">Focuser body (telescope)</text>

    <!-- clamp body dashed outline -->
    <rect x="46" y="42" width="268" height="91" rx="12" fill="none" stroke="#2980b9" stroke-width="2" stroke-dasharray="7 4"/>
    <text x="180" y="155" text-anchor="middle" font-size="10" fill="#2980b9">clamp wraps focuser body</text>

    <!-- motor housing -->
    <rect x="314" y="56" width="66" height="64" rx="6" fill="#f0f3f6" stroke="#2c3e50" stroke-width="1.5"/>
    <!-- motor circle -->
    <circle cx="347" cy="88" r="24" fill="white" stroke="#7f8c8d" stroke-width="1"/>
    <text x="347" y="92" text-anchor="middle" font-size="9" fill="#5d6d7e">28BYJ-48</text>

    <!-- large gear on focuser shaft -->
    <circle cx="290" cy="88" r="34" fill="none" stroke="#2c3e50" stroke-width="1.5"/>
    <circle cx="290" cy="88" r="5"  fill="white" stroke="#2c3e50" stroke-width="1.5"/>

    <!-- small pinion on motor shaft -->
    <circle cx="347" cy="88" r="14" fill="none" stroke="#2c3e50" stroke-width="1.5"/>

    <!-- mesh contact mark -->
    <circle cx="323" cy="88" r="4" fill="#e74c3c"/>
    <text x="320" y="78" font-size="9" fill="#e74c3c">mesh</text>

    <!-- gear labels -->
    <text x="258" y="90" font-size="9" fill="#2980b9" font-weight="600" text-anchor="middle">40T</text>
    <text x="347" y="108" font-size="9" fill="#2980b9" font-weight="600" text-anchor="middle">10T</text>

    <!-- electronics box below -->
    <rect x="46" y="175" width="110" height="52" rx="5" fill="white" stroke="#2c3e50" stroke-width="1.2"/>
    <text x="101" y="205" text-anchor="middle" font-size="10" fill="#5d6d7e">Electronics box</text>

    <!-- motor cable -->
    <path d="M156,200 Q210,185 314,130" fill="none" stroke="#7f8c8d" stroke-width="1" stroke-dasharray="4 3"/>
    <text x="230" y="170" font-size="9" fill="#7f8c8d">motor cable</text>

    <!-- USB cable -->
    <path d="M101,227 L101,248" fill="none" stroke="#2980b9" stroke-width="1.5" stroke-dasharray="4 3"/>
    <text x="115" y="248" font-size="9" fill="#2980b9">USB-C to Linux</text>

    <!-- dimension arrow: gear centre distance -->
    <line x1="290" y1="128" x2="347" y2="128" stroke="#7f8c8d" stroke-width="0.8" marker-start="url(#arr)" marker-end="url(#arr)"/>
    <text x="318" y="142" text-anchor="middle" font-size="9" fill="#7f8c8d">75 mm</text>
  </g>

  <!-- ─── Hardware strip ──────────────────────────── -->
  <rect x="20" y="660" width="760" height="70" rx="8" fill="#1a252f"/>
  <text x="400" y="682" text-anchor="middle" font-size="12" font-weight="600" fill="#ffffff">Hardware bill of materials</text>
  <text x="400" y="700" text-anchor="middle" font-size="10" fill="#95a5a6">M3×12 × 4 (clamp bolts)  ·  M3×6 × 2 (lid)  ·  M3 heat-set insert × 6  ·  M2×8 × 2 (motor PCB)  ·  M2 heat-set × 4  ·  M3 grub screw × 1</text>
  <text x="400" y="718" text-anchor="middle" font-size="10" fill="#95a5a6">Print: PETG  ·  0.2 mm layers  ·  4 perimeters  ·  45 % infill on gears  ·  No supports required</text>

  <!-- ─── Footer ──────────────────────────────────── -->
  <rect x="0" y="740" width="800" height="30" fill="#f0f3f6"/>
  <text x="400" y="758" text-anchor="middle" font-size="9" fill="#7f8c8d">
    github.com/YOUR_USERNAME/indi-focuser-esp32s3  ·  MIT Licence  ·  OpenSCAD source: 3d_files/rvo-horizon-60ed/
  </text>

  <!-- ─── Part number badges ──────────────────────── -->
  <circle cx="67"  cy="108" r="10" fill="#2980b9"/>
  <text x="67"  y="112" text-anchor="middle" font-size="10" font-weight="700" fill="white">1</text>
  <circle cx="297" cy="108" r="10" fill="#2980b9"/>
  <text x="297" y="112" text-anchor="middle" font-size="10" font-weight="700" fill="white">2</text>
  <circle cx="527" cy="108" r="10" fill="#2980b9"/>
  <text x="527" y="112" text-anchor="middle" font-size="10" font-weight="700" fill="white">3</text>
  <circle cx="67"  cy="368" r="10" fill="#2980b9"/>
  <text x="67"  y="372" text-anchor="middle" font-size="10" font-weight="700" fill="white">4</text>
  <circle cx="297" cy="368" r="10" fill="#2980b9"/>
  <text x="297" y="372" text-anchor="middle" font-size="10" font-weight="700" fill="white">5</text>
</svg>
